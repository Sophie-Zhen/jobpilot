name: tests

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install LaTeX (for PDF rendering tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended

      - name: Install jobpilot
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pypdf

      - name: Run pytest
        run: pytest tests/ -v
